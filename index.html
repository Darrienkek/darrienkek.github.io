<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Oxanium:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260305-2">
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="brand-lockup" aria-label="Sign Atlas">
        <div class="brand-mark">
          <span class="brand-mark-inner"></span>
        </div>
        <div class="brand-text">Sign Atlas</div>
      </div>

      <nav class="topnav" aria-label="Primary">
        <a class="topnav-link is-active" href="#explorer">Explorer</a>
        <a class="topnav-link topnav-cta" href="https://github.com/Darrienkek/blockscanner" target="_blank" rel="noreferrer">Auto Scanner</a>
      </nav>

      <p id="serverAddress" class="server-chip">Loading server…</p>
    </header>

    <main class="page">
      <section class="hero" id="explorer">
        <div class="hero-copy">
          <h1>Snacker Signs</h1>
          <p id="summary" class="summary">Loading signs…</p>
        </div>
        <div class="hero-panel">
          <p class="hero-panel-label">Archive Status</p>
          <p id="resultsMeta" class="hero-panel-main"></p>
          <p id="generatedAt" class="hero-panel-sub"></p>
        </div>
      </section>

      <section class="controls" aria-label="Filters">
        <label class="search-field">
          <span class="sr-only">Search text or coordinates</span>
          <input id="searchInput" type="search" placeholder="Search sign content (e.g. 'Shop', 'Warning', 991)">
        </label>

        <label class="field">
          <span class="sr-only">Sign type</span>
          <select id="typeFilter">
            <option value="">Sign Type</option>
          </select>
        </label>

        <label class="field">
          <span class="sr-only">Dimension</span>
          <select id="dimensionFilter">
            <option value="">Dimension</option>
          </select>
        </label>

        <label class="field">
          <span class="sr-only">Sort by</span>
          <select id="sortOrder">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="text-az">Text A-Z</option>
            <option value="text-za">Text Z-A</option>
          </select>
        </label>

        <label class="field">
          <span class="sr-only">Signs per page</span>
          <select id="pageSize">
            <option value="40">40</option>
            <option value="80">80</option>
            <option value="120">120</option>
            <option value="200">200</option>
            <option value="all">All</option>
          </select>
        </label>

        <label class="checkbox">
          <input id="onlyWithText" type="checkbox" checked>
          <span>Only signs with text</span>
        </label>
      </section>

      <section class="results">
        <div id="signList" class="sign-grid" aria-live="polite"></div>
        <nav class="pager" aria-label="Pagination">
          <button id="prevPage" class="pager-arrow" type="button" aria-label="Previous page">&#8249;</button>
          <div id="pageNumbers" class="page-numbers"></div>
          <button id="nextPage" class="pager-arrow" type="button" aria-label="Next page">&#8250;</button>
        </nav>
        <p id="pageInfo" class="page-info">Page 1 of 1</p>
      </section>
    </main>

    <footer class="footer" id="scanner">
      <p>For the Snackers. Lets find IT.</p>
    </footer>
  </div>

  <template id="signCardTemplate">
    <article class="sign-card">
      <div class="sign-stage">
        <span class="type-badge" data-field="typeBadge"></span>
        <pre class="sign-text"></pre>
      </div>
      <p class="coords" data-field="coords"></p>
      <div class="card-footer">
        <span class="dimension-pill" data-field="dimension"></span>
        <span class="seen" data-field="seen"></span>
      </div>
    </article>
  </template>

  <script src="app.js?v=20260305-2" defer></script>
</body>
</html>
